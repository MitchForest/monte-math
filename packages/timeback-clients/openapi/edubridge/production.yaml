  /edubridge/analytics/highestGradeMastered/:studentId/:subject:
    get:
      operationId: getHighestGradeMastered
      summary: Gets the highest grade mastered by a student for a given subject
      description: >-
        Gets the highest grade mastered by a student for a given subject across
        different data sources (currently edulastic, placement and test out
        datasets)
      tags: *ref_1
      parameters:
        - in: path
          name: studentId
          description: >-
            The sourced_id of the student for which to get the highest grade
            mastered
          schema:
            type: string
            description: >-
              The sourced_id of the student for which to get the highest grade
              mastered
          required: true
        - in: path
          name: subject
          description: The subject for which to get the highest grade mastered
          schema:
            type: string
            description: The subject for which to get the highest grade mastered
          required: true
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  studentId:
                    type: string
                    description: >-
                      The sourced_id of the student for which to get the highest
                      grade mastered
                  subject:
                    type: string
                    description: The subject for which to get the highest grade mastered
                  grades:
                    type: object
                    properties:
                      ritGrade:
                        oneOf:
                          - $ref: '#/components/schemas/GradeEnum'
                          - type: 'null'
                      edulasticGrade:
                        oneOf:
                          - $ref: '#/components/schemas/GradeEnum'
                          - type: 'null'
                      placementGrade:
                        oneOf:
                          - $ref: '#/components/schemas/GradeEnum'
                          - type: 'null'
                      testOutGrade:
                        oneOf:
                          - $ref: '#/components/schemas/GradeEnum'
                          - type: 'null'
                      highestGradeOverall:
                        oneOf:
                          - $ref: '#/components/schemas/GradeEnum'
                          - type: 'null'
                    required:
                      - ritGrade
                      - edulasticGrade
                      - placementGrade
                      - testOutGrade
                      - highestGradeOverall
                required:
                  - studentId
                  - subject
                  - grades
  /edubridge/subject-track/:
    get:
      operationId: getSubjectTracks
      summary: Get all subject tracks
      description: >-
        List all subject tracks: the target course for each organization
        (school/campus), subject and grade level combination. Includes both
        organization-specific tracks and global tracks that apply to all
        organizations.
      tags: &ref_4
        - Edubridge - Subject Track
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  subjectTrack:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        grade:
                          $ref: '#/components/schemas/GradeEnum'
                        subject:
                          $ref: '#/components/schemas/SubjectEnum'
                        course:
                          type: object
                          properties:
                            sourcedId:
                              type: string
                              minLength: 1
                            status:
                              type: string
                              enum: *ref_2
                            dateLastModified:
                              type: string
                              format: date-time
                            metadata:
                              type: object
                              additionalProperties: true
                              nullable: true
                              description: Additional metadata for the object
                            title:
                              type: string
                            courseCode:
                              type:
                                - string
